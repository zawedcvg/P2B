<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rectangle Data Visualization</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 20px;
                padding: 30px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            }

            h1 {
                text-align: center;
                color: #2c3e50;
                margin-bottom: 30px;
                font-size: 2.5em;
                font-weight: 300;
            }

            .chart-container {
                background: white;
                border-radius: 15px;
                padding: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                margin-bottom: 30px;
            }

            .tooltip {
                position: absolute;
                background: rgba(0, 0, 0, 0.9);
                color: white;
                padding: 12px;
                border-radius: 8px;
                font-size: 14px;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.3s;
                max-width: 400px;
                z-index: 1000;
            }

            .tooltip strong {
                color: #64b5f6;
            }

            .axis {
                font-size: 12px;
                color: #666;
            }

            .axis-label {
                font-size: 14px;
                font-weight: 500;
                fill: #333;
            }

            .grid line {
                stroke: #e0e0e0;
                stroke-dasharray: 2,2;
            }

            .grid path {
                stroke-width: 0;
            }

            .rectangle {
                cursor: pointer;
                transition: all 0.3s ease;
                stroke: #333;
                stroke-width: 1;
            }

            .rectangle:hover {
                stroke: #000;
                stroke-width: 3;
                filter: brightness(1.1);
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }

            .stat-card {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
                border-radius: 10px;
                text-align: center;
            }

            .stat-value {
                font-size: 2em;
                font-weight: bold;
                margin-bottom: 5px;
            }

            .stat-label {
                font-size: 0.9em;
                opacity: 0.9;
            }

            .zoom-controls {
                position: absolute;
                top: 10px;
                right: 10px;
                display: flex;
                gap: 5px;
                align-items: center;
            }

            .zoom-btn {
                background: #667eea;
                color: white;
                border: none;
                border-radius: 5px;
                width: 30px;
                height: 30px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
            }

            .zoom-info {
                background: rgba(0, 0, 0, 0.7);
                color: white;
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 12px;
            }

            .legend {
                position: absolute;
                bottom: 10px;
                right: 10px;
                background: rgba(255, 255, 255, 0.9);
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                font-size: 12px;
                max-width: 200px;
            }

            .legend-title {
                font-weight: bold;
                margin-bottom: 10px;
                font-size: 14px;
            }

            .legend-item {
                display: flex;
                align-items: center;
                margin-bottom: 5px;
            }

            .legend-color {
                width: 20px;
                height: 15px;
                margin-right: 8px;
                border: 1px solid #333;
            }

            .legend-opacity {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid #ddd;
            }

            .display-controls {
                position: absolute;
                bottom: 10px;
                left: 10px;
                background: rgba(255, 255, 255, 0.95);
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                font-size: 12px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .control-group {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .control-group label {
                font-weight: bold;
                min-width: 70px;
            }

            #box-count-slider {
                width: 120px;
            }

            #box-count-display {
                font-weight: bold;
                color: #667eea;
                min-width: 30px;
            }

            .control-btn {
                background: #667eea;
                color: white;
                border: none;
                border-radius: 5px;
                width: 30px;
                height: 30px;
                cursor: pointer;
                font-size: 16px;
            }

            .control-btn:hover {
                background: #5a6fd8;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Rectangle Data Visualization</h1>

            <div class="chart-container">
                <div id="chart" style="position: relative;">
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
                        <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
                        <button class="zoom-btn" id="reset-zoom" title="Reset Zoom">⌂</button>
                        <div class="zoom-info" id="zoom-info">Zoom: 1x</div>
                    </div>
                    <div class="display-controls">
                        <div class="control-group">
                            <label for="box-count-slider">Show Boxes:</label>
                            <input type="range" id="box-count-slider" min="10" max="500" value="500" step="10">
                            <span id="box-count-display">500</span>
                        </div>
                        <div class="control-group">
                            <button id="shuffle-btn" class="control-btn" title="Shuffle Selection">🎲</button>
                        </div>
                    </div>
                    <div class="legend">
                        <div class="legend-title">Legend</div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #ff0000;"></div>
                            <span>Score: 0 (Red)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #8000ff;"></div>
                            <span>Score: 5 (Purple)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #0000ff;"></div>
                            <span>Score: 10 (Blue)</span>
                        </div>
                        <div class="legend-opacity">
                            <strong>Transparency:</strong><br>
                            Higher volume = More transparent<br>
                            Lower volume = More opaque
                        </div>
                    </div>
                </div>
            </div>

            <div class="stats" id="stats"></div>
        </div>

        <div class="tooltip" id="tooltip"></div>

        <script>
            // Data points from Python
            const points = [{"coords": [[-0.19098365306854248, -0.15789474546909332], [0.06457660347223282, 0.12092630565166473]], "prompt": "Using Python, create a program that analyzes a given text for words that have homonyms (words with the same spelling but different meanings) and replaces them with their intended meaning. For example, \"I saw a bear in the park\" could be misinterpreted as \"I saw bare skin in the park\". Your program must be able to identify the context of the word and replace it with the appropriate meaning.", "volume": 0.07125557935338955, "score": 5.0, "index": 0}, {"coords": [[0.7092084288597107, -0.3381142318248749], [1.0314099788665771, 0.009772717952728271]], "prompt": "Develop an algorithm that can detect a given type of fraud.\nCredit Card Fraud", "volume": 0.11208971444550464, "score": 5.0, "index": 1}, {"coords": [[-0.5215779542922974, -1.201910138130188], [0.5921361446380615, -0.25539156794548035]], "prompt": "Produce an index of sovereign nations located within the geographical boundaries of the African continent.", "volume": 1.0541510765141133, "score": 7.0, "index": 2}, {"coords": [[-0.4979742169380188, 0.1628081202507019], [-0.11346960067749023, 0.5269255638122559]], "prompt": "Write a story of length 40 words based on the given input.\nElephant in the House", "volume": 0.14000483791039997, "score": 7.0, "index": 3}, {"coords": [[-0.22813615202903748, -0.032655827701091766], [0.11419570446014404, 0.26837047934532166]], "prompt": "Compose a sentence that characterizes the protagonist's manner of movement as they make their way through a harsh and unforgiving landscape, driven by an urgent mission to reach a remote outpost and deliver life-saving supplies to a group of stranded explorers.", "volume": 0.10305089454328109, "score": 7.5, "index": 4}, {"coords": [[-0.25678807497024536, -0.44004005193710327], [0.02079126238822937, -0.27627140283584595]], "prompt": "Can you solve this color-mixing puzzle? Write a Swift function that takes in two UIColors and returns the resulting color when they are mixed together. To add a twist, your function must use a mathematical formula that requires some reasoning to solve. Once you have solved the puzzle, try running the function using a shell command in Terminal. Good luck!", "volume": 0.045458793097619576, "score": 6.5, "index": 5}, {"coords": [[-0.0936928540468216, -0.2981589436531067], [0.05768813192844391, -0.18860113620758057]], "prompt": "How can I modify this Scala program to classify text into categories using a JSON data input? Specifically, I want to input text into a JSON object, and have the program classify the text into one of the following categories: travel & tourism, health & fitness, culinary, tech & gadgets. Can you provide the JSON data to create the object and modify the Scala code to accept the input and classify the text? \nPlease also provide the modified Scala code that accepts the JSON data input and returns the categorized output.", "volume": 0.01658496891239203, "score": 5.0, "index": 6}, {"coords": [[0.016228847205638885, -0.18441490828990936], [0.15047240257263184, -0.08685825765132904]], "prompt": "Can you provide examples of historical sites or artifacts related to ancient Roman culture that have been preserved due to natural disasters or geological events? And how has the discovery of these artifacts contributed to our knowledge of Roman society and customs?\nAdditionally, I am working on a Swift project and I am interested in implementing a feature that allows users to explore and learn more about these artifacts. Can you provide some Swift code examples for accessing and displaying information about these artifacts?", "volume": 0.013096351631418646, "score": 5.0, "index": 7}, {"coords": [[0.19637632369995117, -0.19432701170444489], [0.19641560316085815, -0.1942748874425888]], "prompt": "How can we determine the best alarm method based on factors such as sound level, frequency, sleep duration, consistency, sleep quality, and overall health? Please refer to the following XML data for the effectiveness ratings of various alarm types:\n<alarms>\n  <alarm>\n    <type>Buzzer</type>\n    <soundLevel>85 dB</soundLevel>\n    <frequency>440 Hz</frequency>\n    <rating>7</rating>\n  </alarm>\n  <alarm>\n    <type>Radio</type>\n    <soundLevel>60 dB</soundLevel>\n    <frequency>500 Hz</frequency>\n    <rating>5</rating>\n  </alarm>\n  <alarm>\n    <type>Bird Song</type>\n    <soundLevel>50 dB</soundLevel>\n    <frequency>1000 Hz</frequency>\n    <rating>8</rating>\n  </alarm>\n  <alarm>\n    <type>Nature Sounds</type>\n    <soundLevel>70 dB</soundLevel>\n    <frequency>2000 Hz</frequency>\n    <rating>9</rating>\n  </alarm>\n  <alarm>\n    <type>Voice</type>\n    <soundLevel>65 dB</soundLevel>\n    <frequency>800 Hz</frequency>\n    <rating>6</rating>\n  </alarm>\n</alarms>\nAnd the following XML data for the impact of individual sleeping habits and overall health:\n<factors>\n  <factor>\n    <name>Sleep Duration</name>\n    <impact>Longer sleep duration may make the alarm less effective</impact>\n  </factor>\n  <factor>\n    <name>Consistency</name>\n    <impact>Irregular sleep patterns may reduce the effectiveness of the alarm</impact>\n  </factor>\n  <factor>\n    <name>Sleep Quality</name>\n    <impact>Poor sleep quality may reduce the effectiveness of the alarm</impact>\n  </factor>\n  <factor>\n    <name>Overall Health</name>\n    <impact>Poor overall health may reduce the effectiveness of the alarm</impact>\n  </factor>\n</factors>\nBased on this information, what combination of alarm type, sound level, frequency, and individual factors would provide the most effective waking method for an individual's circadian rhythm?", "volume": 1e-08, "score": 7.5, "index": 8}, {"coords": [[0.008911632001399994, -0.1852419674396515], [0.14806050062179565, -0.04934748262166977]], "prompt": "Imagine you are a data scientist working on a project that involves analyzing a vast amount of high-dimensional data. You decide to use one of the AI techniques from the table below to solve the problem. However, your boss asks you to use a technique that is not computationally expensive, as the company's budget is limited. Which technique would you choose?\n<table>\n  <tr>\n    <th>Technique</th>\n    <th>Strengths</th>\n    <th>Weaknesses</th>\n  </tr>\n  <tr>\n    <td>Method A</td>\n    <td>High accuracy, can handle large amounts of data</td>\n    <td>Computationally expensive, requires large amounts of labeled data</td>\n  </tr>\n  <tr>\n    <td>Method B</td>\n    <td>Can learn from feedback, can handle dynamic environments</td>\n    <td>Slow to converge, requires extensive trial and error</td>\n  </tr>\n  <tr>\n    <td>Method C</td>\n    <td>Can handle uncertainty and incomplete data</td>\n    <td>Limited scalability, difficult to model complex relationships</td>\n  </tr>\n  <tr>\n    <td>Method D</td>\n    <td>Can find global optimums, can handle multiple objectives</td>\n    <td>Slow convergence, not suited for continuous variables</td>\n  </tr>\n  <tr>\n    <td>Method E</td>\n    <td>Simple to understand and interpret, can handle categorical and numerical data</td>\n    <td>Prone to overfitting, not well-suited for high-dimensional data</td>\n  </tr>\n  <tr>\n    <td>Method F</td>\n    <td>Effective for classification tasks, can handle non-linear data</td>\n    <td>Difficult to interpret, sensitive to kernel choice</td>\n  </tr>\n</table>", "volume": 0.01890956381417369, "score": 7.0, "index": 9}, {"coords": [[0.024404719471931458, -0.28836774826049805], [0.1844475120306015, -0.11110199987888336]], "prompt": "What is the R code to extract and organize data from multiple sources to create a timeline of significant developments in communication technology throughout history? The data sources are in different formats, including XML, CSV, and JSON. Can you provide an example of how to effectively extract and organize the data using R code to create a coherent timeline?", "volume": 0.02837010539599616, "score": 7.5, "index": 10}, {"coords": [[-0.4363108277320862, 0.7130410075187683], [0.4512211084365845, 1.444700002670288]], "prompt": "Get the synonyms of \u201cnervous\u201d.", "volume": 0.6493707245820524, "score": 9.0, "index": 11}, {"coords": [[-0.6379576325416565, 0.15612787008285522], [0.47681349515914917, 1.157644271850586]], "prompt": "Generate a short fiction story about a family of three.", "volume": 1.1164615686094663, "score": 8.0, "index": 12}, {"coords": [[0.11960960179567337, -0.22565023601055145], [0.29386231303215027, -0.05275903642177582]], "prompt": "Elaborate on the complexities involved in solving the 'Producer-Consumer Problem', including potential bottlenecks and synchronization challenges that arise in a multi-threaded or distributed computing environment. Provide examples of real-world applications where this problem is encountered and the impact of inefficient solutions.", "volume": 0.030126760277271014, "score": 8.0, "index": 13}, {"coords": [[-0.02930956333875656, -0.08120689541101456], [0.15620186924934387, 0.14272338151931763]], "prompt": "A university is searching for a new professor, but they are looking for someone with a unique set of qualities. Can you determine the six positive attributes that the university is looking for in their ideal candidate? \nHint: Each attribute has a specific numerical value that represents its importance to the university's decision-making process. Your goal is to determine these values based on the following clues: \n1. The attribute that represents the ability to inspire and engage students in the classroom is worth four times as much as the attribute that represents research ability. \n2. The attribute that represents the ability to work collaboratively with colleagues is worth twice as much as the attribute that represents teaching experience. \n3. The attribute that represents leadership qualities is worth three times as much as the attribute that represents the ability to communicate complex ideas clearly. \n4. The attribute that represents a commitment to diversity and inclusivity is worth the same as the attribute that represents a strong work ethic. \n5. The attribute that represents innovation and creativity is worth half as much as the attribute that represents expertise in their field. \n6. The sum of all six attribute values is 50. \nWhat are the six attributes and their respective values that the university is looking for in their ideal professor?", "volume": 0.04154162647319598, "score": 2.0, "index": 14}, {"coords": [[-0.06190234795212746, -0.23729705810546875], [0.14951299130916595, 0.013210274279117584]], "prompt": "Welcome to the food analysis puzzle challenge! Here's a task to keep those AI systems on their toes: \nUsing the Swift code and data provided, can you calculate the average calories, fat, carbs, and protein content of fruits and vegetables separately and present the results in an Excel table? But wait, there's a twist! You can only use the Excel functions AVERAGEIF, SUMIF, and COUNTIF to calculate the averages. Good luck! Don't forget to provide a step-by-step guide on how to create the Excel table and perform the calculations.", "volume": 0.052961092663528914, "score": 6.0, "index": 15}, {"coords": [[-0.1797080934047699, -0.017790421843528748], [0.04147558659315109, 0.18021439015865326]], "prompt": "Welcome to the Puzzle Challenge! Let's see if you can solve this gravity puzzle. \nYou and your friend are in a zero-gravity chamber and are given a task to push a ball to the other end of the chamber. Your friend decides to push the ball with all their force, which sends the ball flying at a high speed but also sends them in the opposite direction. Meanwhile, you decide to use a series of gentle nudges to propel the ball forward without any major movements. \nNow, the question is, what is the minimum number of nudges you need to push the ball to the other end of the chamber before your friend gets there? Remember, the answer requires some reasoning and understanding of gravity, not just a simple calculation. Can you figure it out?", "volume": 0.04379543297593913, "score": 5.0, "index": 16}, {"coords": [[-0.16359788179397583, -0.09203242510557175], [0.06960710138082504, 0.07930836826562881]], "prompt": "Can you devise a mathematical formula or logical reasoning that can adjust the outcome of an experiment in a Latex format, so that it represents the majority of the data even when the hypothesis has been refuted? Additionally, is there a set of statistical methods or logical techniques that can be implemented to strengthen the updated conclusion? Your response should be in the form of a logical puzzle that requires critical thinking to solve.", "volume": 0.03995752683528786, "score": 6.0, "index": 17}, {"coords": [[-0.30082446336746216, -0.3044005334377289], [0.05212756246328354, 0.0502566397190094]], "prompt": "Given the list of words $words = \\{ \\text{injuries, the, result, United, States, Gun, violence, of, thousands, tens} \\}$, how can you sort them in alphabetical order to form a sentence? Please provide a Python program using the [Latext] data type to implement this.", "volume": 0.12517696774107634, "score": 4.0, "index": 18}, {"coords": [[-0.09466129541397095, 0.27373605966567993], [0.6525089144706726, 0.9182831645011902]], "prompt": "Tell me about a place in France that is known for its beautiful landscape.", "volume": 0.48158639560048755, "score": 8.5, "index": 19}, {"coords": [[-0.1638922244310379, -0.18641655147075653], [-0.10196353495121002, -0.18639005720615387]], "prompt": "Incorporate a multi-step reasoning process to generate a Go code metaphor that illustrates an unremitting chase by replacing general concepts with more specific concepts. Utilize the variables: \n- pursuit: a string that signifies the chase's nature\n- object: a string representing the object being chased\n- intensity: a numerical value on a scale of 1-10 indicating the chase's s n $adal = Join-Path $AadModule.ModuleBase \"Microsoft.IdentityModel.Clients.ActiveDirectory.dll\"\n $adalforms = Join-Path $AadModule.ModuleBase \"Microsoft.IdentityModel.Clients.ActiveDirectory.Platform.dll\"\n\n }\n\n else {\n\n $adal = Join-Path $AadModule.ModuleBase \"Microsoft.IdentityModel.Clients.ActiveDirectory.dll\"\n $adalforms = Join-Path $AadModule.ModuleBase \"Microsoft.IdentityModel.Clients.ActiveDirectory.Platform.dll\"\n\n }\n\n[System.Reflection.Assembly]::LoadFrom($adal) | Out-Null\n\n[System.Reflection.Assembly]::LoadFrom($adalforms) | Out-Null\n\n$clientId = \"d1ddf0e4-d672-4dae-b554-9d5bdfd93547\"\n\n$redirectUri = \"urn:ietf:wg:oauth:2.0:oob\"\n\n$resourceAppIdURI = \"https://graph.microsoft.com\"\n\n$authority = \"https://login.microsoftonline.com/$Tenant\"\n\n try {\n\n $authContext = New-Object \"Microsoft.IdentityModel.Clients.ActiveDirectory.AuthenticationContext\" -ArgumentList $authority\n\n # https://msdn.microsoft.com/en-us/library/azure/microsoft.identitymodel.clients.activedirectory.promptbehavior.aspx\n # Change the prompt behaviour to force credentials each time: Auto, Always, Never, RefreshSession\n\n $platformParameters = New-Object \"Microsoft.IdentityModel.Clients.ActiveDirectory.PlatformParameters\" -ArgumentList \"Auto\"\n\n $userId = New-Object \"Microsoft.IdentityModel.Clients.ActiveDirectory.UserIdentifier\" -ArgumentList ($User, \"OptionalDisplayableId\")\n\n $authResult = $authContext.AcquireTokenAsync($resourceAppIdURI,$clientId,$redirectUri,$platformParameters,$userId).Result\n\n # If the accesstoken is valid then create the authentication header\n\n if($authResult.AccessToken){\n\n # Creating header for Authorization token\n\n $authHeader = @{\n 'Content-Type'='application/json'\n 'Authorization'=\"Bearer \" + $authResult.AccessToken\n 'ExpiresOn'=$authResult.ExpiresOn\n }\n\n return $authHeader\n\n }\n\n else {\n\n Write-Host\n Write-Host \"Authorization Access Token is null, please re-run authentication...\" -ForegroundColor Red\n Write-Host\n break\n\n }\n\n }\n\n catch {\n\n write-host $\\_.Exception.Message -f Red\n write-host $\\_.Exception.ItemName -f Red\n write-host\n break\n\n }\n\n}\n\n####################################################\n\nFunction Get-AndroidEnrollmentProfile {\n\n<#\n.SYNOPSIS\nGets Android Enterprise Enrollment Profile\n.DESCRIPTION\nGets Android Enterprise Enrollment Profile\n.EXAMPLE\nGet-AndroidEnrollmentProfile\n.NOTES\nNAME: Get-AndroidEnrollmentProfile\n#>\n\n$graphApiVersion = \"Beta\"\n$Resource = \"deviceManagement/androidDeviceOwnerEnrollmentProfiles\"\n \n try {\n \n $now = (Get-Date -Format s) \n $uri = \"https://graph.microsoft.com/$graphApiVersion/$($Resource)?`$filter=tokenExpirationDateTime gt $($now)z\"\n (Invoke-RestMethod -Uri $uri \u2013Headers $authToken \u2013Method Get).value\n \n }\n \n catch {\n\n $ex = $\\_.Exception\n $errorResponse = $ex.Response.GetResponseStream()\n $reader = New-Object System.IO.StreamReader($errorResponse)\n $reader.BaseStream.Position = 0\n $reader.DiscardBufferedData()\n $responseBody = $reader.ReadToEnd();\n Write-Host \"Response content:`n$responseBody\" -f Red\n Write-Error \"Request to $Uri failed with HTTP Status $($ex.Response.StatusCode) $($ex.Response.StatusDescription)\"\n write-host\n break\n\n }\n\n}\n\n####################################################\n\n#region Authentication\n\nwrite-host\n\n# Checking if authToken exists before running authentication\nif($global:authToken){\n\n # Setting DateTime to Universal time to work in all timezones\n $DateTime = (Get-Date).ToUniversalTime()\n\n # If the authToken exists checking when it expires\n $TokenExpires = ($authToken.ExpiresOn.datetime - $DateTime).Minutes\n\n if($TokenExpires -le 0){\n\n write-host \"Authentication Token expired\" $TokenExpires \"minutes ago\" -ForegroundColor Yellow\n write-host\n\n # Defining User Principal Name if not present\n\n if($User -eq $null -or $User -eq \"\"){\n\n $User = Read-Host -Prompt \"Please spec ed changes to food stamps was testimony to the FGA\u2019s growing influence in key Republican circles.\nThe work requirements at issue Friday would have fundamentally changed the food stamp program for many adult recipients. Under the plan, most able-bodied people between 18 and 60 would have to work or attend a state training program for 20 hours a week to receive benefits.\nHouse Republicans \u2014 including Ryan, who was introduced to the group in 2016 through Kansas Gov. Sam Brownback \u2014 have repeatedly proffered the FGA\u2019s analysis as proof that most Americans support strict work rules in welfare programs and that such rules boost income and employment.\nThe FGA, as well as more-established think tanks such as Heritage and the American Enterprise Institute, has long argued that welfare recipients leave poverty faster when their benefits are tied to employment.\nBut unlike the old guard, the FGA \u2014 with its low national profile, remote staff of 26 and annual donations of about $7 million in 2017 \u2014 until now devoted itself to state policy, said chief executive Tarren Bragdon.\nThat focus changed in 2016, the year Republicans swept the White House, the House and the Senate, and Bragdon met Ryan at the behest of Brownback, the speaker's former boss. The FGA had worked with Brownback to strengthen food stamp work requirements in Kansas, a cause that Ryan supported.\nAt a meeting with Bragdon in May 2016 and in subsequent conversations, Ryan expressed interest in the FGA\u2019s work and research, Bragdon said. In January 2017, the FGA hired its first federal lobbyist. One year later, Bragdon made a presentation to House GOP leaders on \u201chow to successfully move people from welfare to work\u201d in programs such as SNAP, which provides food benefits.\nThe FGA pursued that goal in the past by advancing bills that bar states from seeking waivers to food stamp requirements, as well as advocating for Medicaid work requirements and campaigning against fter they lost benefits, said Jeffrey Grogger, an applied microeconomist at the University of Chicago who has studied welfare.\nGrogger also said the paper fails to establish a direct relationship between the welfare policy changes and outcomes for recipients. Most welfare recipients obtain jobs and leave the program anyway, he said, regardless of work requirements.\nAnd he said the paper is at odds with the scientific literature, which has largely found that such rules do not greatly improve recipients\u2019 incomes and may even hurt them.\nIn addition to the Kansas study, House Republicans have distributed an FGA analysis of three-year-old U.S. Department of Agriculture data that breaks down the number of unemployed, able-bodied SNAP recipients by state. A Washington Post review of more recent USDA data suggests that the current figures on food stamp recipients are lower than the FGA has claimed.\nThe group has also circulated polling numbers suggesting that almost all Americans support stricter work requirements, but those figures have been faulted by observers like Peter Germanis, a conservative economist who served in the Reagan and Bush administrations, for oversimplifying public opinion and the available evidence.\nIn an interview, Bragdon defended his team\u2019s analysis, saying other researchers are free to use \u201cdifferent approaches.\u201d The FGA's poll results are in line with those conducted by other groups, he said. And the FGA prepared its state-by-state analysis last year, before the most recent data was available.\nBragdon said he is \u201cproud\u201d of his group's research, which he has pushed to get in front of as many lawmakers as possible. The FGA specializes in slick policy one-pagers, which \u2014 with their color-coded headlines and catchy graphics \u2014 appear to owe a debt to Bragdon\u2019s brother, Trevor, a behavioral scientist who has worked with the FGA and specializes in \u201cpersuasive branding\u201d for conservative causes.\n ard, SPS chapters are recognized for high levels of interaction with the campus community, the professional physics community, the public and with SPS national programs. The outstanding chapter designation is given to less than 10 percent of all SPS chapters in the United States and internationally. Although this is the second time the UK chapter has received this award, it has been almost 25 years since UK was initially recognized as a top-tier student-led physical sciences organization.\nFor the Chapter Research Award, chapters submit research proposals with the top five percent receiving the financial grant. The title of their proposal is \"Data Analysis and Accuracy: Small Supercomputer versus a Desktop Dinosaur.\" Students will build a mini-supercomputer following the Tiny Titan building plan from Oak Ridge National Lab. Once built, it will be used for research projects, experiments and simulations. Additionally, students will present the supercomputer during the SPS Open Lab Day this spring.\nThe chapter's president, Dany Walker, said, \"This recognition is a high honor for the University of Kentucky and for science achievement at the higher education level in Kentucky. We are so thrilled to be recognized and look forward to doing even more work in our community.\"\nThe UK Society of Physics Students chapter is a professional and social organization for physics majors and minors, as well as students with a general interest in physics. SPS operates within the American Institute of Physics (AIP), an umbrella organization for professional physical science societies. Each semester the chapter hosts interactive presentations during which professors speak about their research and provide students with the opportunity to interact outside of a traditional classroom setting. Additionally, SPS also hosts an open lab day to promote education in physics and showcase the research occurring in the Department of Physics and Astronomy, which is part of the UK College of Arts                             <strong>Height:</strong> ${(d.coords[1][1] - d.coords[0][1]).toFixed(3)}<br>
                            <strong>Volume:</strong> ${d.volume.toFixed(6)}<br>
                            <strong>Prompt:</strong> ${d.prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}<br>
                            <strong>Score:</strong> ${d.score}
                        `)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 10) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr("opacity", getOpacity(d))
                        .attr("stroke-width", 0.5);

                    tooltip.style("opacity", 0);
                });

            // Initialize with seeded random selection
            let currentSeed = 42;
            let visibleIndices = [];

            // Function to shuffle array using seeded random
            function seededShuffle(array, seed) {
                const rng = function(seed) {
                    let x = Math.sin(seed) * 10000;
                    return x - Math.floor(x);
                };

                let shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(rng(seed + i) * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            // Function to update visible rectangles
            function updateVisibleRectangles(maxCount) {
                const allIndices = points.map((d, i) => i);
                const shuffledIndices = seededShuffle(allIndices, currentSeed);
                visibleIndices = shuffledIndices.slice(0, maxCount);

                rectangles.style("opacity", (d, i) => {
                    return visibleIndices.includes(i) ? getOpacity(points[i]) : 0;
                });


                // Update statistics for visible rectangles
                updateStatistics(maxCount);
            }

            // Function to update statistics based on visible rectangles
            function updateStatistics(displayCount) {
                const visiblePoints = points.filter((d, i) => visibleIndices.includes(i));
                const stats = {
                    totalRects: visiblePoints.length,
                    totalOriginal: points.length,
                    avgVolume: visiblePoints.length > 0 ? d3.mean(visiblePoints, d => d.volume).toFixed(6) : "0.000000",
                    maxVolume: visiblePoints.length > 0 ? d3.max(visiblePoints, d => d.volume).toFixed(6) : "0.000000",
                    minVolume: visiblePoints.length > 0 ? d3.min(visiblePoints, d => d.volume).toFixed(6) : "0.000000",
                    avgWidth: visiblePoints.length > 0 ? d3.mean(visiblePoints, d => d.coords[1][0] - d.coords[0][0]).toFixed(3) : "0.000",
                    avgHeight: visiblePoints.length > 0 ? d3.mean(visiblePoints, d => d.coords[1][1] - d.coords[0][1]).toFixed(3) : "0.000"
                };

                const statCards = [
                    {label: "Total Available", value: stats.totalOriginal},
                    {label: "Random Sample", value: stats.totalRects},
                    {label: "Average Volume", value: stats.avgVolume},
                    {label: "Max Volume", value: stats.maxVolume},
                    {label: "Min Volume", value: stats.minVolume},
                    {label: "Average Width", value: stats.avgWidth},
                    {label: "Average Height", value: stats.avgHeight}
                ];

                // Clear and rebuild stats
                d3.select("#stats").selectAll("*").remove();
                statCards.forEach(stat => {
                    d3.select("#stats").append("div")
                        .attr("class", "stat-card")
                        .html(`
                            <div class="stat-value">${stat.value}</div>
                            <div class="stat-label">${stat.label}</div>
                        `);
                });
            }

            // Initialize which rectangles should be visible
            const initialCount = Math.min(500, points.length);
            updateVisibleRectangles(initialCount);

            // Slider control
            d3.select("#box-count-slider").on("input", function() {
                const count = +this.value;
                d3.select("#box-count-display").text(count);
                updateVisibleRectangles(count);
            });

            // Shuffle button
            d3.select("#shuffle-btn").on("click", function() {
                currentSeed = Math.random() * 10000;
                const count = +d3.select("#box-count-slider").property("value");
                updateVisibleRectangles(count);
            });

            // Zoom control buttons with reduced zoom steps
            d3.select("#zoom-in").on("click", function() {
                svg.transition().call(zoom.scaleBy, 1.2);
            });

            d3.select("#zoom-out").on("click", function() {
                svg.transition().call(zoom.scaleBy, 1 / 1.2);
            });

            d3.select("#reset-zoom").on("click", function() {
                svg.transition().call(zoom.transform, d3.zoomIdentity);
            });

            // Calculate and display statistics
            const stats = {
                totalRects: points.length,
                avgVolume: points.length > 0 ? d3.mean(points, d => d.volume).toFixed(6) : "0.000000",
                maxVolume: points.length > 0 ? d3.max(points, d => d.volume).toFixed(6) : "0.000000",
                minVolume: points.length > 0 ? d3.min(points, d => d.volume).toFixed(6) : "0.000000",
                avgWidth: points.length > 0 ? d3.mean(points, d => d.coords[1][0] - d.coords[0][0]).toFixed(3) : "0.000",
                avgHeight: points.length > 0 ? d3.mean(points, d => d.coords[1][1] - d.coords[0][1]).toFixed(3) : "0.000"
            };

            const statsContainer = d3.select("#stats");

            const statCards = [
                {label: "Total Rectangles", value: stats.totalRects},
                {label: "Average Volume", value: stats.avgVolume},
                {label: "Max Volume", value: stats.maxVolume},
                {label: "Min Volume", value: stats.minVolume},
                {label: "Average Width", value: stats.avgWidth},
                {label: "Average Height", value: stats.avgHeight}
            ];

            statCards.forEach(stat => {
                statsContainer.append("div")
                    .attr("class", "stat-card")
                    .html(`
                        <div class="stat-value">${stat.value}</div>
                        <div class="stat-label">${stat.label}</div>
                    `);
            });

            // Add title
            svg.append("text")
                .attr("x", (width + margin.left + margin.right) / 2)
                .attr("y", 25)
                .attr("text-anchor", "middle")
                .style("font-size", "18px")
                .style("font-weight", "bold")
                .style("fill", "#333")
                .text("Interactive Rectangle Visualization - Score Colors & Volume Transparency");
        </script>
    </body>
    </html>
